<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade</title>
    <link rel="stylesheet" href="styles/index.css">
</head>

<body>
    <form action="#">
        <img src="image/salario-familia.jpg" alt="Previdência">
        <div class="formAssunto">
            <label for="Emprego"></label>
            <input id="Emprego" required type="text" placeholder="Empregado">
            <label for=""></label>
        </div>

        <div class="formAssunto">
            <label for="filhos"></label>
            <input id="filhos" required type="number"
                placeholder="Quantidade de filhos menores de 14 anos ou inválidos">
            <label for=""></label>
        </div>

        <div class="formAssunto">
            <label for="contribuicao"></label>
            <input id="contribuicao" required type="number" placeholder="Salário contribuição">
        </div>
        <div id="valores">
            <div class="ParteEsquerda">
                <div class="tabela">Salario-contribuição</div>
                <div class="tabela">Até R$806,80</div>
                <div class="tabela">Entre R$ 806,81 e R$ 1212,64</div>
                <div class="tabela"> Mais R$ 1212,64</div>
            </div>

            <div class="ParteDireita">
                <div class="tabela">Cota do Salário Família</div>
                <div class="tabela">R$ 41,37 por filho</div>
                <div class="tabela">R$29,16 por filho</div>
                <div class="tabela">Não há</div>

            </div>
        </div>
        <div id="buttons">
            <Button id="BOTAO" type="submit">CALCULAR</Button>
        </div>
    </form>
</body>

</html>
